name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build all platforms without creating a release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ''
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            ext: ''
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: ''
          - os: macos-13
            platform: macos
            arch: x64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify license is AGPL-3.0
        shell: bash
        run: |
          grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE || { echo "::error::LICENSE file does not contain AGPL-3.0"; exit 1; }
          grep -q '"AGPL-3.0-or-later"' package.json || { echo "::error::package.json license is not AGPL-3.0-or-later"; exit 1; }
          echo "License check passed"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./lib/constants').VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "exe_name=hermitstash-sync-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"

      - name: Build SEA binary
        run: node build/build-sea.js

      - name: Verify binary
        shell: bash
        run: |
          EXE="build/${{ steps.version.outputs.exe_name }}"
          "${EXE}" version

      # ---- Security scans ----

      - name: Windows Defender scan
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo Updating virus definitions...
          "C:\Program Files\Windows Defender\MpCmdRun.exe" -SignatureUpdate
          echo Running full scan...
          "C:\Program Files\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File "%CD%\build\${{ steps.version.outputs.exe_name }}" -DisableRemediation

      # ---- GPG signing ----

      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
        if: env.GPG_KEY != ''
        shell: bash
        run: |
          echo "${GPG_KEY}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep -E "^sec" | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"

      - name: GPG sign artifacts
        if: env.GPG_KEY_ID != ''
        env:
          GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          EXE="build/${{ steps.version.outputs.exe_name }}"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASS}" --default-key "${GPG_KEY_ID}" --armor --detach-sign "${EXE}"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASS}" --default-key "${GPG_KEY_ID}" --armor --detach-sign "${EXE}.sha256"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASS}" --default-key "${GPG_KEY_ID}" --armor --detach-sign "${EXE}.sha3-512"

      # ---- Upload artifacts for release job ----

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            build/${{ steps.version.outputs.exe_name }}
            build/${{ steps.version.outputs.exe_name }}.sha256
            build/${{ steps.version.outputs.exe_name }}.sha3-512
            build/${{ steps.version.outputs.exe_name }}.asc
            build/${{ steps.version.outputs.exe_name }}.sha256.asc
            build/${{ steps.version.outputs.exe_name }}.sha3-512.asc
          if-no-files-found: ignore

  release:
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Build release notes
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./lib/constants').VERSION)")
          TAG="v${VERSION}"
          GPG_KEY_ID="${{ secrets.GPG_PRIVATE_KEY && 'yes' || '' }}"
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"

          node -e "
          var fs = require('fs');
          var path = require('path');
          var tag = '${TAG}';
          var repo = '${REPO}';
          var runId = '${RUN_ID}';
          var hasGpg = '${GPG_KEY_ID}' !== '';

          // Find all binaries
          var artDir = 'artifacts';
          var files = fs.readdirSync(artDir).filter(function(f) {
            return f.startsWith('hermitstash-sync-') && !f.includes('.sha') && !f.includes('.asc');
          }).sort();

          var platforms = {
            'win-x64': 'Windows x64',
            'linux-x64': 'Linux x64',
            'linux-arm64': 'Linux ARM64 (Raspberry Pi, AWS Graviton)',
            'macos-arm64': 'macOS Apple Silicon (M1/M2/M3/M4)',
            'macos-x64': 'macOS Intel',
          };

          var lines = [];
          lines.push('## HermitStash Sync ' + tag);
          lines.push('');
          lines.push('### Downloads');
          lines.push('');
          lines.push('| Platform | Binary | Checksum | Signature |');
          lines.push('|----------|--------|----------|-----------|');

          files.forEach(function(f) {
            var m = f.match(/-(win|linux|macos)-(x64|arm64)/);
            var label = m ? (platforms[m[1]+'-'+m[2]] || m[1]+' '+m[2]) : f;
            var sha = fs.existsSync(path.join(artDir, f+'.sha3-512')) ? '\`sha3-512\`' : '';
            var sig = fs.existsSync(path.join(artDir, f+'.asc')) ? '\`gpg\`' : '';
            lines.push('| ' + label + ' | \`' + f + '\` | ' + sha + ' | ' + sig + ' |');
          });

          lines.push('');
          lines.push('### Verify integrity');
          lines.push('');
          lines.push('\`\`\`bash');
          lines.push('# Replace BINARY with the downloaded filename');
          lines.push('sha256sum -c BINARY.sha256');
          lines.push('sha3sum -c BINARY.sha3-512');
          lines.push('\`\`\`');

          if (hasGpg) {
            lines.push('');
            lines.push('### Verify GPG signature');
            lines.push('');
            lines.push('\`\`\`bash');
            lines.push('gpg --verify BINARY.asc BINARY');
            lines.push('\`\`\`');
          }

          lines.push('');
          lines.push('### Requirements');
          lines.push('');
          lines.push('- HermitStash server v1.5.0+ with sync features enabled');
          lines.push('- No Node.js installation needed (self-contained binary)');
          lines.push('');
          lines.push('### Build info');
          lines.push('');
          lines.push('- License: AGPL-3.0-or-later');
          lines.push('- Node.js: ' + process.version);
          lines.push('- OpenSSL: ' + process.versions.openssl);
          lines.push('- TLS: SecP384r1MLKEM1024 > X25519MLKEM768 > SecP256r1MLKEM768 (Level 5 preferred)');
          lines.push('- Built by: GitHub Actions ([view workflow run](https://github.com/' + repo + '/actions/runs/' + runId + '))');
          lines.push('- Platforms: ' + files.length + ' (' + files.map(function(f) { var m = f.match(/-(win|linux|macos)-(x64|arm64)/); return m ? m[1]+'/'+m[2] : '?'; }).join(', ') + ')');
          fs.writeFileSync('release-notes.md', lines.join('\n') + '\n');
          console.log('Release notes: ' + lines.length + ' lines, ' + files.length + ' binaries');
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/*
          fail_on_unmatched_files: false
