name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            ext: .exe
          # Future: uncomment to build for other platforms
          # - os: ubuntu-latest
          #   platform: linux
          #   arch: x64
          #   ext: ''
          # - os: macos-latest
          #   platform: macos
          #   arch: arm64
          #   ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./lib/constants').VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "exe_name=hermitstash-sync-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"

      - name: Build SEA binary
        run: node build/build-sea.js

      - name: Verify binary
        shell: bash
        run: |
          EXE="build/${{ steps.version.outputs.exe_name }}"
          "${EXE}" version

      # ---- Security scans ----

      - name: Windows Defender scan
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo Updating virus definitions...
          "C:\Program Files\Windows Defender\MpCmdRun.exe" -SignatureUpdate
          echo Running full scan...
          "C:\Program Files\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File "%CD%\build\${{ steps.version.outputs.exe_name }}" -DisableRemediation

      # VirusTotal scan disabled — run locally via scripts/release.sh if needed
      # The 91MB SEA binary requires the large file upload endpoint and takes
      # several minutes to scan, which is better suited to the local release script.

      # ---- SignPath signing (requires approval) ----
      # Uncomment after SignPath OSS approval:
      #
      # - name: Sign with SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: '<your-org-id>'
      #     project-slug: 'hermitstash-sync'
      #     signing-policy-slug: 'release-signing'
      #     artifact-configuration-slug: 'exe'
      #     github-artifact-id: '${{ steps.version.outputs.exe_name }}'
      #     wait-for-completion: true

      # ---- GPG signing ----

      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
        if: env.GPG_KEY != ''
        shell: bash
        run: |
          echo "${GPG_KEY}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep -E "^sec" | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"

      - name: GPG sign artifacts
        if: env.GPG_KEY_ID != ''
        env:
          GPG_PASS: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          EXE="build/${{ steps.version.outputs.exe_name }}"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASS}" --default-key "${GPG_KEY_ID}" --armor --detach-sign "${EXE}"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASS}" --default-key "${GPG_KEY_ID}" --armor --detach-sign "${EXE}.sha256"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASS}" --default-key "${GPG_KEY_ID}" --armor --detach-sign "${EXE}.sha3-512"

      # ---- Create release ----

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          EXE="${{ steps.version.outputs.exe_name }}"
          SHA256=$(cat "build/${EXE}.sha256" | awk '{print $1}')
          SHA3=$(cat "build/${EXE}.sha3-512" | awk '{print $1}')
          VT_URL=""
          TAG="${{ steps.version.outputs.tag }}"
          node -e "
          var fs = require('fs');
          var exe = process.env.EXE;
          var sha256 = process.env.SHA256;
          var sha3 = process.env.SHA3;
          var vtUrl = '';
          var tag = process.env.TAG;
          var gpgKey = process.env.GPG_KEY_ID || '';
          var platform = '${{ matrix.platform }}';
          var arch = '${{ matrix.arch }}';
          var runId = '${{ github.run_id }}';
          var repo = '${{ github.repository }}';
          var hasAsc = fs.existsSync('build/' + exe + '.asc');
          var lines = [];
          lines.push('## HermitStash Sync ' + tag);
          lines.push('');
          lines.push('### Downloads');
          lines.push('');
          lines.push('| File | Description |');
          lines.push('|------|-------------|');
          lines.push('| \`' + exe + '\` | Windows x64 binary (Node.js SEA) |');
          lines.push('| \`' + exe + '.sha256\` | SHA-256 checksum |');
          lines.push('| \`' + exe + '.sha3-512\` | SHA3-512 checksum |');
          if (hasAsc) {
            lines.push('| \`' + exe + '.asc\` | GPG signature (binary) |');
            lines.push('| \`' + exe + '.sha256.asc\` | GPG signature (SHA-256) |');
            lines.push('| \`' + exe + '.sha3-512.asc\` | GPG signature (SHA3-512) |');
          }
          lines.push('');
          lines.push('### Verify integrity');
          lines.push('');
          lines.push('\`\`\`bash');
          lines.push('# SHA-256');
          lines.push('echo \"' + sha256 + '  ' + exe + '\" | sha256sum -c');
          lines.push('');
          lines.push('# SHA3-512');
          lines.push('echo \"' + sha3 + '  ' + exe + '\" | sha3sum -c');
          lines.push('\`\`\`');
          if (hasAsc && gpgKey) {
            lines.push('');
            lines.push('### Verify signature');
            lines.push('');
            lines.push('\`\`\`bash');
            lines.push('gpg --keyserver keyserver.ubuntu.com --recv-keys ' + gpgKey);
            lines.push('gpg --verify ' + exe + '.asc ' + exe);
            lines.push('\`\`\`');
          }
          lines.push('');
          lines.push('### Security scan results');
          lines.push('');
          lines.push('| Scanner | Result |');
          lines.push('|---------|--------|');
          lines.push('| Windows Defender | clean (updated definitions) |');
          if (vtUrl) lines.push('| VirusTotal (70+ engines) | [View full report](' + vtUrl + ') |');
          lines.push('');
          lines.push('### Requirements');
          lines.push('');
          lines.push('- HermitStash server v1.5.0+ with sync features enabled');
          lines.push('- No Node.js installation needed (self-contained binary)');
          lines.push('');
          lines.push('### Build info');
          lines.push('');
          lines.push('- Node.js: ' + process.version);
          lines.push('- OpenSSL: ' + process.versions.openssl);
          lines.push('- Platform: ' + platform + ' ' + arch);
          lines.push('- Built by: GitHub Actions ([view workflow run](https://github.com/' + repo + '/actions/runs/' + runId + '))');
          fs.writeFileSync('release-notes.md', lines.join('\n') + '\n');
          console.log('Release notes generated (' + lines.length + ' lines)');
          "

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          EXE="${{ steps.version.outputs.exe_name }}"
          FILES="build/${EXE} build/${EXE}.sha256 build/${EXE}.sha3-512"
          if [ -f "build/${EXE}.asc" ]; then
            FILES="${FILES} build/${EXE}.asc build/${EXE}.sha256.asc build/${EXE}.sha3-512.asc"
          fi
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            build/${{ steps.version.outputs.exe_name }}
            build/${{ steps.version.outputs.exe_name }}.sha256
            build/${{ steps.version.outputs.exe_name }}.sha3-512
            build/${{ steps.version.outputs.exe_name }}.asc
            build/${{ steps.version.outputs.exe_name }}.sha256.asc
            build/${{ steps.version.outputs.exe_name }}.sha3-512.asc
          fail_on_unmatched_files: false
